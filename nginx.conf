server {
    listen 80;
    server_name _;

    # 强制 HTTP → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    # 静态文件（前端构建产物）
    location /assets/ {
        alias /var/www/aiic/assets/;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # Monaco Editor 本地静态资源
    location /monaco-editor/ {
        alias /var/www/aiic/monaco-editor/;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # 慢端点（LLM / 火山 ASR / 文件上传）统一长超时 + 关闭缓冲：
    #
    #   SSE 流式：
    #     /chat/stream            历史 demo 流式 chat
    #     /chat                   POST stream chat
    #     /interview/chat         5 关面试 stream
    #     /practice/chat          单关练习 stream
    #
    #   非流式但常 > 60s（默认 proxy_read_timeout 会砍掉返回 502 / 504 HTML，
    #   前端 await resp.json() 直接抛 "Unexpected token '<', <html>..."）：
    #     /interview/stage-review      LLM JSON 模式生成关卡面评
    #     /interview/final-report      LLM JSON 模式生成终面报告
    #     /practice/stage-review       同上 · 练习模式
    #     /upload                      PDF 上传 + Kimi 文件解析
    #     /asr                         火山异步 ASR，submit + 轮询最长 30s
    #     /tts                         火山 TTS
    location ~ ^/(chat(/stream)?|interview/(chat|stage-review|final-report)|practice/(chat|stage-review)|asr|tts|upload)$ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect http:// $scheme://;
        # SSE 端点必须关 buffering；其他端点关掉也无害（FastAPI 反代不依赖 nginx 缓存）
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        # 文件上传可能 ~10MB，给客户端到 nginx 的 body 体设大点
        client_max_body_size 32m;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # 其他所有请求
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect http:// $scheme://;
    }
}
