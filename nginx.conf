server {
    listen 80;
    server_name _;

    # 强制 HTTP → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    # 静态文件（前端构建产物）
    location /assets/ {
        alias /var/www/aiic/assets/;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # SSE 流式接口：必须关闭缓冲 + 拉长超时，否则流式效果被抵消，
    # 且 stage 0 的 web_search 多轮 LLM 调用常常 > 60s，
    # 默认 proxy_read_timeout 60s 会把连接砍掉，前端 fetch 抛 network error。
    #
    # 所有走 SSE 的端点：
    #   /chat/stream            历史 demo 流式 chat
    #   /chat                   POST stream chat
    #   /interview/chat         5 关面试 stream
    #   /practice/chat          单关练习 stream
    location ~ ^/(chat(/stream)?|interview/chat|practice/chat)$ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect http:// $scheme://;
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # 其他所有请求
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect http:// $scheme://;
    }
}
