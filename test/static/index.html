<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIIC Challenge - 集成测试</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 AIIC Challenge 集成测试</h1>
            <p>Kimi 旗舰模型 + 豆包语音合成</p>
        </div>

        <!-- Kimi 聊天 -->
        <div class="card">
            <div class="card-title">💬 Kimi 文本对话</div>
            <div class="chat-box" id="chatBox">
                <div class="message bot">你好！我是 Kimi（kimi-k2.6），发送消息即可开始对话。</div>
            </div>
            <div class="input-area">
                <input type="text" id="msgInput" placeholder="输入消息..." />
                <button class="btn btn-primary" id="sendBtn" onclick="sendChat()">发送</button>
            </div>
            <div class="status" id="chatStatus">就绪</div>
        </div>

        <!-- 豆包语音合成 -->
        <div class="card">
            <div class="card-title">🔊 豆包语音合成（TTS）</div>
            <textarea id="ttsText" placeholder="输入要合成的文本...">你好，这是豆包语音合成的测试。</textarea>
            <div class="settings-row">
                <input type="text" id="ttsSpeaker" value="zh_female_qingchezizi_moon_bigtts" />
                <button class="btn btn-success" id="ttsBtn" onclick="doTTS()">合成语音</button>
            </div>
            <div class="audio-wrap" id="audioWrap">
                <audio id="ttsAudio" controls></audio>
            </div>
            <div class="hint">默认音色：清澈梓梓 | 可在上方输入框切换其他 speaker ID</div>
            <div class="status" id="ttsStatus">就绪</div>
        </div>

        <div class="footer">
            项目正式开始：2026-05-10 08:00 · 当前为测试环境
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
