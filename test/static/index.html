<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kimi API 测试</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            padding: 32px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            color: #333;
        }
        .subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .chat-box {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 16px;
            min-height: 200px;
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 16px;
            background: #fafafa;
        }
        .message {
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.5;
        }
        .message.user {
            background: #e3f2fd;
            margin-left: 20%;
        }
        .message.bot {
            background: #fff;
            border: 1px solid #e0e0e0;
            margin-right: 20%;
        }
        .input-area {
            display: flex;
            gap: 8px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }
        input[type="text"]:focus {
            border-color: #1976d2;
        }
        button {
            padding: 12px 24px;
            background: #1976d2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #1565c0; }
        button:disabled { background: #90caf9; cursor: not-allowed; }
        .status {
            margin-top: 12px;
            font-size: 12px;
            color: #888;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 Kimi API 测试</h1>
        <div class="subtitle">输入消息，测试后端服务与 Kimi API 连通性</div>
        
        <div class="chat-box" id="chatBox">
            <div class="message bot">你好！这是一个简单的测试页面。发送消息即可调用 Kimi API。</div>
        </div>
        
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="输入消息..." />
            <button id="sendBtn" onclick="send()">发送</button>
        </div>
        
        <div class="status" id="status">就绪</div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const status = document.getElementById('status');

        msgInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') send();
        });

        async function send() {
            const text = msgInput.value.trim();
            if (!text) return;

            appendMessage('user', text);
            msgInput.value = '';
            sendBtn.disabled = true;
            status.textContent = '请求中...';

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await res.json();
                appendMessage('bot', data.reply || '无响应');
                status.textContent = '就绪';
            } catch (err) {
                appendMessage('bot', '请求失败: ' + err.message);
                status.textContent = '请求失败';
            } finally {
                sendBtn.disabled = false;
            }
        }

        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = 'message ' + role;
            div.textContent = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
